<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>text mmo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        background: #0d0d0d;
        color: #d4d4d4;
        font-family: "SF Mono", Menlo, Consolas, monospace;
        display: flex;
        justify-content: center;
        padding: 16px;
      }
      #app {
        display: flex;
        gap: 24px;
      }
      #grid {
        margin: 0;
        background: #000;
        border: 1px solid #333;
        user-select: none;
      }
      #side {
        width: 340px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #status {
        color: #ce9178;
        white-space: pre-wrap;
      }
      #log {
        flex: 1;
        min-height: 200px;
        max-height: 60vh;
        overflow-y: auto;
        border: 1px solid #333;
        padding: 8px;
        font-size: 13px;
      }
      #log .chat-zone {
        color: #b5cea8;
      }
      #log .chat-global {
        color: #dcdcaa;
      }
      #log .error {
        color: #f48771;
      }
      #chatbar {
        display: none;
        gap: 6px;
      }
      #chatbar.open {
        display: flex;
      }
      #chat-prompt {
        color: #569cd6;
      }
      #chat-field {
        flex: 1;
        background: #1e1e1e;
        border: 1px solid #333;
        color: #d4d4d4;
        font: inherit;
        padding: 4px 6px;
      }
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #overlay.hidden {
        display: none;
      }
      #overlay form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #1e1e1e;
        border: 1px solid #333;
        padding: 24px;
      }
      #overlay input,
      #overlay button {
        font: inherit;
        padding: 8px;
        background: #0d0d0d;
        color: #d4d4d4;
        border: 1px solid #444;
      }
      #overlay-error {
        color: #f48771;
        min-height: 1em;
        font-size: 13px;
      }
      .hint {
        color: #666;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="grid"></canvas>
      <div id="side">
        <div id="status"></div>
        <div id="log"></div>
        <div id="chatbar">
          <span id="chat-prompt">[zone] &gt;</span>
          <input id="chat-field" maxlength="240" autocomplete="off" />
        </div>
        <div class="hint">move: arrows / wasd — chat: Enter — channel: Tab — cancel: Esc</div>
      </div>
    </div>
    <div id="overlay">
      <form id="join-form">
        <label for="handle">choose a handle</label>
        <input
          id="handle"
          maxlength="16"
          pattern="[a-zA-Z0-9_\-]{1,16}"
          autocomplete="off"
          required
        />
        <button type="submit">enter the caves</button>
        <div id="overlay-error"></div>
      </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
